<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>订单支付</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
        }
        .pay-container {
            max-width: 1000px;
            margin: 0 auto;
            background: #fff;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        h1 {
            text-align: center;
            font-size: 36px;
            margin-bottom: 20px;
        }
        .goods-name {
            text-align: center;
            font-size: 22px;
            color: #333;
            margin-bottom: 20px;
        }
        .amount-box {
            background: #fff2f2;
            border-radius: 10px;
            padding: 25px;
            text-align: center;
            margin-bottom: 25px;
        }
        .amount {
            font-size: 52px;
            color: #ff3333;
            font-weight: bold;
        }
        .tip {
            text-align: center;
            color: #ff5722;
            font-size: 22px;
            margin-bottom: 30px;
        }
        .pay-method {
            background: #2196f3;
            border-radius: 12px;
            padding: 25px;
            color: #fff;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .pay-method::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 12px;
            background: #000;
            border-bottom-left-radius: 50%;
            border-bottom-right-radius: 50%;
        }
        .pay-method::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 12px;
            background: #000;
            border-top-left-radius: 50%;
            border-top-right-radius: 50%;
        }
        .pay-method .title {
            font-size: 20px;
            margin-bottom: 20px;
        }
        .address-box {
            background: #fff;
            border-radius: 10px;
            padding: 20px;
            color: #333;
        }
        .address-tip {
            color: #ff9800;
            font-size: 16px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .address-tip i {
            font-style: normal;
            color: #ff9800;
            background: #fff3e0;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .address-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
            font-size: 16px;
        }
        .address {
            font-weight: bold;
            color: #222;
        }
        .copy-btn {
            background: #2196f3;
            color: #fff;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .copy-btn:hover {
            opacity: 0.9;
        }
        .qrcode {
            margin: 20px auto 0;
            width: 380px;
            height: auto;
            max-height: 380px;
            display: block;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <div class="pay-container">
        <h1>订单支付</h1>
        <div class="goods-name" id="goodsName">商品：加载中...</div>
        <div class="amount-box">
            <div class="amount" id="amount">金额：0</div>
        </div>
        <div class="tip">请按上方金额完成支付</div>
        <div class="pay-method">
            <div class="title">打开 TokenPocket [扫一扫]</div>
            <div class="address-box">
                <div class="address-tip">
                    <i>i</i> 仅向该地址转入TRX/TRC20相关资产
                </div>

                <div class="address-row">
                    收款地址：<span id="receiveAddress" class="address">THWF3xsjAgrWVETbKsQyofDDeRmuwQMLvh</span>
                    <button class="copy-btn" onclick="copyAddress()">复制</button>
                </div>

                <img src="assets/luna/img/pay.png" class="qrcode" alt="支付码">
            </div>
        </div>
    </div>

    <script>
        function copyAddress() {
            const addr = document.getElementById('receiveAddress').innerText;
            navigator.clipboard.writeText(addr).then(() => {
                alert('地址复制成功！');
            });
        }

        function getQueryParams() {
            const params = {};
            const query = window.location.search.substring(1);
            const vars = query.split("&");
            for (let i = 0; i < vars.length; i++) {
                const pair = vars[i].split("=");
                params[pair[0]] = decodeURIComponent(pair[1]);
            }
            return params;
        }

        document.addEventListener('DOMContentLoaded', function() {
            const params = getQueryParams();
            const goodsName = params.name || '未知商品';
            const total = params.total || params.price || '0';

            document.getElementById('goodsName').textContent = `商品：${goodsName}`;
            document.getElementById('amount').textContent = `金额：${total} U`;
        });
    </script>
</body>
</html>
