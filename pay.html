<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>支付页面</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family: "Microsoft YaHei"}
        body{background:#f5f5f5;padding:15px;}
        .container{max-width:500px;margin:30px auto;background:#fff;padding:25px 30px;border-radius:14px;box-shadow:0 5px 20px rgba(0,0,0,0.1);}
        .title{font-size:24px;font-weight:bold;margin-bottom:20px;text-align:center;color:#222;}
        
        /* 支付金额 大号显示 */
        .price-box{
            text-align:center;
            font-size:32px;
            font-weight:bold;
            color:#ff3300;
            margin:20px 0;
            padding:15px;
            background:#fff3f3;
            border-radius:10px;
        }

        .goods-info{
            text-align:center;
            font-size:16px;
            color:#333;
            margin-bottom:10px;
        }
        .tip{text-align:center;color:#ff4500;font-size:16px;margin:20px 0;font-weight:bold;}
        .pay-image{width:100%;border-radius:10px;overflow:hidden;margin:20px 0;}
        .pay-image img{width:100%;display:block;}
        .back-btn{display:block;width:100%;height:48px;line-height:48px;text-align:center;background:#3C8CE7;color:#fff;border-radius:10px;margin-top:20px;text-decoration:none;font-size:16px;font-weight:bold;}
    </style>
</head>

<body>
    <div class="container">
        <div class="title">订单支付</div>

        <!-- 商品名称 -->
        <div class="goods-info">
            商品：<span id="gname"></span>
        </div>

        <!-- 🔥 支付金额（超大红色字体） -->
        <div class="price-box">
            金额：<span id="gprice"></span>
        </div>

        <div class="tip">请按上方金额完成支付</div>

        <!-- 支付码图片 -->
        <div class="pay-image">
            <img src="assets/luna/img/pay.jpg" alt="支付码">
        </div>

        <a href="index.html" class="back-btn">← 返回商品列表</a>
    </div>

    <script>
        let params = new URLSearchParams(location.search);
        document.getElementById('gname').innerText = params.get('name') || '未知商品';
        document.getElementById('gprice').innerText = params.get('price') || '0 U';
    </script>
</body>
</html>
